<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>FireRiskApp Docs</title>
  <meta name="description" content="Documentação técnica do FireRiskApp — modelo CHICHORRO de avaliação de risco de incêndio em edifícios históricos." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #c0392b;
    }
    .sidebar-toggle { color: var(--theme-color); }
    .app-name-link { font-weight: 700; }
  </style>
</head>
<body>
  <div id="app">A carregar...</div>
  <script>
    window.$docsify = {
      name: 'FireRiskApp Docs',
      repo: 'https://github.com/joaopmteixeira/fireriskapp-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar documentação...',
        noData: 'Sem resultados.',
        depth: 3,
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Erro',
        successText: 'Copiado!',
      },
      pagination: {
        previousText: '← Anterior',
        nextText: 'Próximo →',
        crossChapter: true,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
